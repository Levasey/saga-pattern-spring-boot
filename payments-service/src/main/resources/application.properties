server.port=8082

spring.jackson.deserialization.fail-on-unknown-properties=true

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5434}/${POSTGRES_DB:payments}
spring.datasource.username=${POSTGRES_USER:saga}
spring.datasource.password=${POSTGRES_PASSWORD:saga}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.kafka.admin.auto-create=false
spring.kafka.bootstrap-servers=localhost:9092,localhost:9094,localhost:9096
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.linger.ms=0
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.allow.auto.create.topics=false
spring.kafka.consumer.group-id=payments-ms
spring.kafka.consumer.properties.spring.json.trusted.packages=io.github.levasey.saga.core.*
spring.kafka.consumer.properties.allow.auto.create.topics=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
remote.ccp.url=http://localhost:8084
payment.sample-credit-card-number=374245455400126

payments.commands.topic.name=payments-commands
payments.events.topic.name=payments-events

